<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Interaction Capture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      padding: 20px;
      min-height: 100vh;
    }

    .header {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      font-size: 18px;
      margin-bottom: 5px;
      color: #667eea;
    }

    .header p {
      font-size: 12px;
      color: #999;
    }

    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
      background: #ccc;
    }

    .status-indicator.recording {
      background: #ff4444;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .controls {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .button-primary {
      background: #667eea;
      color: white;
    }

    .button-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .button-danger {
      background: #ff4444;
      color: white;
    }

    .button-danger:hover {
      background: #dd3333;
    }

    .button-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .button-secondary:hover {
      background: #e0e0e0;
    }

    .stats {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 13px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .stat-label {
      color: #999;
      font-weight: 500;
    }

    .stat-value {
      color: #667eea;
      font-weight: 700;
    }

    .export-menu {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      display: none;
    }

    .export-menu.active {
      display: block;
    }

    .export-button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .export-button:hover {
      background: #667eea;
      color: white;
    }

    .info-box {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      margin-bottom: 15px;
      border-left: 3px solid white;
    }

    .technologies {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 12px;
    }

    .tech-badge {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      margin: 4px 4px 4px 0;
      font-size: 11px;
      font-weight: 500;
    }

    .tech-badge.detected {
      background: #4caf50;
    }

    .footer {
      color: white;
      text-align: center;
      font-size: 11px;
      padding-top: 10px;
    }

    .footer a {
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <span class="status-indicator" id="statusIndicator"></span>
        Web Interaction Capture
      </h1>
      <p id="statusText">Ready to record</p>
    </div>

    <div class="info-box">
      📱 Capture all user interactions and generate automation code
    </div>

    <div class="controls">
      <button class="button button-primary" id="recordBtn">▶ Start Recording</button>
      <button class="button button-danger" id="stopBtn" style="display: none">
        ⏹ Stop Recording
      </button>
      <button class="button button-secondary" id="exportBtn">📥 Export Audit</button>
    </div>

    <div class="stats" id="stats" style="display: none">
      <div class="stat-row">
        <span class="stat-label">Interactions Captured:</span>
        <span class="stat-value" id="interactionCount">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Duration:</span>
        <span class="stat-value" id="duration">0s</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">DOM Mutations:</span>
        <span class="stat-value" id="mutationCount">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Network Events:</span>
        <span class="stat-value" id="networkCount">0</span>
      </div>
    </div>

    <div class="technologies" id="technologies" style="display: none">
      <strong>Technologies Detected:</strong>
      <div id="techList"></div>
    </div>

    <div class="export-menu" id="exportMenu">
      <button class="export-button" id="exportMarkdown">📄 Export as Markdown</button>
      <button class="export-button" id="exportJSON">🔗 Export as JSON</button>
      <button class="export-button" id="exportCSV">📊 Export as CSV</button>
      <button class="export-button" id="exportYAML">📋 Export as YAML</button>
    </div>

    <div class="footer">
      <p>
        💡 Keyboard Shortcuts:<br />
        Ctrl+Shift+R: Toggle Recording<br />
        Ctrl+Shift+E: Export
      </p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
